[workspace]
channels = ["conda-forge"]
name = "loki"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
python = ">=3.12.0,<3.13"
ffmpeg = ">=8.0.1,<9"
ninja = ">=1.13.2,<2"
sox = ">=14.4.2,<15"
libnpp = ">=13.1.0.44,<14"

[activation.env]
LD_LIBRARY_PATH="$CONDA_PREFIX/lib"

[pypi-options]
index-url = "https://pypi.org/simple"
extra-index-urls = ["https://download.pytorch.org/whl/cu130"]
no-build-isolation = ["flash-attn"]


[pypi-dependencies]
amphion = { git = "https://github.com/Di-Strix/Amphion", rev = "e520cc5e3d0425b4bdf841d40a0adb00b1c3f1ae" }
termcolor = ">=3.3.0, <4"
soundfile = ">=0.13.1, <0.14"
qwen-tts = ">=0.1.1, <0.2"
wheel = ">=0.46.3, <0.47"
xformers = ">=0.0.35, <0.0.36"
numpy = ">=2.4.3, <3"
flash-attn = { url = "https://github.com/mjun0812/flash-attention-prebuild-wheels/releases/download/v0.9.4/flash_attn-2.8.3+cu130torch2.11-cp312-cp312-linux_x86_64.whl" }
hf-transfer = ">=0.1.9, <0.2"
audio-separator = { version = ">=0.44.1, <0.45", extras = ["gpu"] }
onnxruntime-gpu = ">=1.24.4, <2"
